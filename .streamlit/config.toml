# в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘       в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
# =============================================================================
# Aktifkan blok ini untuk MODE TERANG (Classic Almond Cream)
# Hapus/komentari blok [theme] Dark Mode di bawah jika menggunakan ini.
# =============================================================================

[theme]
# --- Identitas Tema ---
name = "Buyback Emas вҖ” Light Mode (Classic Parchment)"

# --- Warna Dasar ---
# Background utama halaman
backgroundColor = "#F4EAE1"

# Background elemen sekunder (sidebar, card bawaan Streamlit)
secondaryBackgroundColor = "#EDE0D4"

# Warna teks utama di seluruh halaman
textColor = "#2C1E11"

# Warna aksen utama (tombol, highlight, border aktif)
primaryColor = "#8B5A2B"

# Font global
font = "serif"


