# =============================================================================
# .streamlit/config.toml
# Konfigurasi Global Tema вҖ” Simulasi Buyback Toko Emas
#
# CARA PENGGUNAAN:
#   Letakkan file ini di: <root_project>/.streamlit/config.toml
#   Pilih salah satu blok [theme] di bawah (light atau dark), simpan, restart.
#
# CATATAN PENTING:
#   config.toml hanya bisa aktif SATU mode sekaligus.
#   Untuk toggle dinamis di runtime, gunakan CSS injection di app.py
#   (sudah diimplementasikan via st.session_state.theme_mode).
# =============================================================================

[server]
# Nonaktifkan CORS untuk development lokal
enableCORS = false
# Nonaktifkan XSRF untuk development (aktifkan kembali di production)
enableXsrfProtection = false

[browser]
# Nama tab browser
serverAddress = "localhost"


# =============================================================================
